<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0d12;
        color: #e6e8ef;
      }
      .card {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.03);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        letter-spacing: 0.02em;
        opacity: 0.9;
      }
      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(0, 0, 0, 0.25);
        color: inherit;
        outline: none;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .row {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }
      .out {
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.12);
        word-break: break-all;
      }
      a {
        color: inherit;
      }
      .muted {
        opacity: 0.7;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>cc — url shortener</h1>
      <form id="form">
        <input
          id="url"
          name="url"
          placeholder="https://example.com/..."
          autocomplete="off"
          spellcheck="false"
          required
        />
        <button id="btn" type="submit">Shorten</button>
      </form>

      <div class="row">
        <div class="muted">API: POST /put (body is URL), GET /&lt;code&gt;</div>
        <div id="status" class="out" style="display: none"></div>
        <div id="result" class="out" style="display: none"></div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("url");
      const btn = document.getElementById("btn");
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      function show(el, text) {
        el.style.display = "block";
        el.textContent = text;
      }

      function showLink(el, url) {
        el.style.display = "block";
        el.innerHTML = `<a href="${url}">${url}</a>`;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const longUrl = input.value.trim();
        if (!longUrl) return;

        btn.disabled = true;
        status.style.display = "none";
        result.style.display = "none";

        try {
          const resp = await fetch("/put", {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: longUrl,
          });
          const data = await resp.json();

          if (!data || !data.ok) {
            show(status, data?.msg || "error");
            return;
          }

          const code = data.msg;
          const shortUrl = `${location.origin}/${code}`;
          show(status, `ok (${resp.status})`);
          showLink(result, shortUrl);
        } catch (err) {
          show(status, String(err));
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
