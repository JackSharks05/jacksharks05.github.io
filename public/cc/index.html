<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0f1a;
        color: #f5f5f5;
      }
      .card {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.03);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        letter-spacing: 0.02em;
        opacity: 0.9;
      }
      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(0, 0, 0, 0.25);
        color: inherit;
        outline: none;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        cursor: pointer;
      }
      .btn-secondary {
        padding: 8px 10px;
        border-radius: 10px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .row {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }
      .out {
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.12);
        word-break: break-all;
      }
      .result-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
      }
      a {
        color: inherit;
      }
      .muted {
        opacity: 0.7;
        font-size: 12px;
      }
      .api {
        display: grid;
        gap: 8px;
      }
      .api pre {
        margin: 0;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.12);
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>cc — url shortener</h1>
      <form id="form">
        <input
          id="url"
          name="url"
          placeholder="https://example.com/..."
          autocomplete="off"
          spellcheck="false"
          required
        />
        <button id="btn" type="submit">Shorten</button>
      </form>

      <div class="row">
        <div id="error" class="out" style="display: none"></div>

        <div id="resultRow" class="result-row" style="display: none">
          <div id="result" class="out"></div>
          <button id="copyBtn" class="btn-secondary" type="button">Copy</button>
        </div>

        <label class="muted" style="display: inline-flex; gap: 8px; align-items: center">
          <input id="showApi" type="checkbox" />
          Show API commands
        </label>

        <div id="api" class="api" style="display: none">
          <div class="muted">POST /put (body is URL), GET /&lt;code&gt;</div>
          <pre><code>curl -X POST https://s.jackdehaan.com/put -H 'Content-Type: text/plain' -d 'https://example.com'

curl -i https://s.jackdehaan.com/&lt;code&gt;</code></pre>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("url");
      const btn = document.getElementById("btn");
      const error = document.getElementById("error");
      const resultRow = document.getElementById("resultRow");
      const result = document.getElementById("result");
      const copyBtn = document.getElementById("copyBtn");
      const showApi = document.getElementById("showApi");
      const api = document.getElementById("api");

      let lastShortUrl = "";

      function show(el, text) {
        el.style.display = "block";
        el.textContent = text;
      }

      function showResult(url) {
        lastShortUrl = url;
        result.innerHTML = `<a href="${url}">${url}</a>`;
        resultRow.style.display = "grid";
      }

      showApi.addEventListener("change", () => {
        api.style.display = showApi.checked ? "grid" : "none";
      });

      copyBtn.addEventListener("click", async () => {
        if (!lastShortUrl) return;
        try {
          await navigator.clipboard.writeText(lastShortUrl);
          copyBtn.textContent = "Copied";
          setTimeout(() => (copyBtn.textContent = "Copy"), 1000);
        } catch (e) {
          show(error, `copy failed: ${String(e)}`);
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const longUrl = input.value.trim();
        if (!longUrl) return;

        btn.disabled = true;
        error.style.display = "none";
        resultRow.style.display = "none";
        copyBtn.textContent = "Copy";

        try {
          const resp = await fetch("/put", {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: longUrl,
          });
          const data = await resp.json();

          if (!data || !data.ok) {
            show(error, data?.msg || "error");
            return;
          }

          const code = data.msg;
          const shortUrl = `${location.origin}/${code}`;
          showResult(shortUrl);
        } catch (err) {
          show(error, String(err));
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
